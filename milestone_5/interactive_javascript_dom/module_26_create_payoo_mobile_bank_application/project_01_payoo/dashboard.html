<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <!-- link favicon -->
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />

    <!-- connect style file -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!-- linked tailwindcss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- connect daisy khala -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- add remixicon cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-100 w-full min-h-dvh">
    <section
      class="bg-white rounded-bl-3xl rounded-br-3xl border-b border-b-zinc-950/10"
    >
      <!-- navbar -->
      <div
        class="py-4 flex items-center justify-between px-4 border-b border-b-zinc-950/10"
      >
        <!-- dp and balance -->
        <div class="flex items-center gap-x-2">
          <!-- dp -->
          <img
            class="w-12 rounded-full"
            src="./assets/images/profile_image_plcaholder.png"
            alt="guest"
          />

          <!-- balance -->
          <div class="">
            <h3 class="text-zinc-950/90 text-lg font-extrabold">
              $ <span>15000</span>
            </h3>
            <p class="text-zinc-950/50 text-sm font-normal">
              Available Balance
            </p>
          </div>
        </div>

        <!-- logout btn -->
        <div class="">
          <button
            class="flex items-center gap-x-1 text-zinc-950/50 text-sm font-normal px-3 py-2.5 rounded-lg outline outline-zinc-950/10 active:bg-zinc-200"
          >
            <span>
              <i class="ri-logout-box-line"></i>
            </span>

            Log Out
          </button>
        </div>
      </div>

      <div class="py-6">
        <!-- welcome section -->
        <div class="px-4">
          <h1 class="text-zinc-950 text-2xl font-bold">🔥 Welcome to Payoo!</h1>
          <p class="text-zinc-950/50 text-base font-normal">
            Enjoy easy and convenient financial services with us. Cashout charge
            is low and effortable.
          </p>
        </div>

        <!-- categories -->
        <div class="px-4 mt-6 grid grid-cols-2 gap-4">
          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-1.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Add Money</p>
            </div>
          </div>

          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-2.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Cashout</p>
            </div>
          </div>

          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-3.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Transfer Money</p>
            </div>
          </div>

          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-4.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Get Bonus</p>
            </div>
          </div>

          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-5.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Pay Bill</p>
            </div>
          </div>

          <!-- single card -->
          <div
            class="flex flex-col items-center justify-center text-center gap-y-2 px-3 py-5 rounded-xl border border-zinc-950/10 transition-all duration-200 active:bg-zinc-200 select-none"
          >
            <!-- category logo -->
            <img src="./assets/images/opt-6.png" alt="category logo" />
            <div class="">
              <p class="text-zinc-950/70 text-sm font-normal">Transactions</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
