<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practoo</title>
    <!-- link css file -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!-- tailwindcss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- remixicon cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- ============ large device alert start ================= -->
    <section
      class="w-full min-h-dvh hidden sm:flex items-center justify-center"
    >
      <div
        class="max-w-xs text-center space-y-4 bg-gray-100 border-zinc-200 p-4 rounded-xl"
      >
        <span class="text-5xl text-red-500">
          <i class="ri-error-warning-line"></i>
        </span>

        <h2 class="text-red-500 text-2xl font-semibold">
          Small Screen Required
        </h2>

        <div class="text-sm font-normal text-zinc-950/60">
          <p>
            Your screen is too much larger for an optimal experience.
            <strong>Maximum width: 640px.</strong> Please use a device with a
            smaller screen for the best experience.
          </p>
        </div>
      </div>
    </section>
    <!-- ============ large device alert end ================= -->

    <!-- ============== login page start ================== -->
    <section class="w-full min-h-dvh flex justify-center items-center p-4">
      <div class="w-full">
        <!-- logo -->
        <div class="practo_logo text-center text-5xl mb-11 lowercase">
          Practo
        </div>

        <!-- form -->
        <form class="space-y-4">
          <input
            required
            autocomplete="off"
            class="bg-neutral-100 border border-stone-300 w-full rounded-md px-4 py-3.5 text-zinc-800 lowercase text-base font-normal placeholder:capitalize placeholder:text-zinc-500"
            type="text"
            name="username"
            id="username"
            placeholder="Username"
          />
          <div class="relative">
            <input
              required
              autocomplete="off"
              class="bg-neutral-100 border border-stone-300 w-full rounded-md px-4 py-3.5 text-zinc-800 text-base font-normal placeholder:text-zinc-500"
              type="password"
              type="password"
              name="password"
              id="password"
              placeholder="Password"
            />

            <!-- forgott password -->
            <div class="w-full text-right">
              <a
                class="text-blue-500 text-xs font-semibold mt-2"
                href="./index.html"
                >Forgotten Password?</a
              >
            </div>
          </div>

          <!-- continue button -->
          <div class="">
            <button
              class="px-4 py-3.5 bg-blue-500 w-full text-sm text-white rounded-sm"
              type="submit"
            >
              Continue
            </button>
          </div>
        </form>
      </div>
    </section>
    <!-- ============== login page end ================== -->

    <!-- connect script file -->
    <script src="./assets/js/app.js"></script>
  </body>
</html>
