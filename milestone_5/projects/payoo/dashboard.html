<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- link tailwindcss using play - cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link style.css file -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- link daisy ui using cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- link font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#1C1C1E] text-white w-full min-h-dvh">
    <!-- header -->
    <div
      class="flex items-center justify-between px-4 py-4 border-b border-b-zinc-800"
    >
      <div class="flex items-center gap-1">
        <div class="">
          <img src="./assets/taka.png" alt="logo" />
        </div>
        <div class="">
          <span class="text-lg font-semibold">$ <span>4500</span></span>
          <p class="text-sm font-normal text-zinc-400">Available Balance</p>
        </div>
      </div>
      <button
        class="px-3 py-2 text-zinc-400 rounded-md outline outline-zinc-600"
      >
        <span>
          <i
            class="fa-solid fa-arrow-right-from-bracket -rotate-180 text-xs"
          ></i>
        </span>
        <span class="text-sm font-normal">Log Out</span>
      </button>
    </div>

    <!-- welcome -->
    <section
      class="bg-zinc-800 px-4 py-6 space-y-6 rounded-bl-3xl rounded-br-3xl"
    >
      <div class="">
        <h1 class="text-2xl font-normal">Welcome to Payooo!</h1>
        <p class="text-base font-normal text-zinc-400">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-1.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Add Money</span>
        </div>

        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-2.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Cashout</span>
        </div>

        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-3.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Transfer Money</span>
        </div>

        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-4.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Get Bonus</span>
        </div>

        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-5.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Pay Bill</span>
        </div>

        <!-- single card -->
        <div
          class="px-3 py-5 rounded-xl outline outline-zinc-700 flex flex-col items-center justify-center gap-2"
        >
          <img src="./assets/opt-6.png" alt="card icon" />
          <span class="text-sm font-normal text-zinc-400">Transactions</span>
        </div>
      </div>
    </section>

    <!-- action section -->
    <section class="px-4 py-10">
      <h1 class="text-lg font-semibold mb-4">Add Money</h1>

      <!-- form -->
      <form action="#" class="space-y-4">
        <!-- input group -->
        <div class="flex flex-col space-y-3">
          <label
            for="bankAccountNumber"
            class="text-zinc-400 text-base font-medium"
            >Bank Account Number</label
          >
          <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="bankAccountNumber"
            id="bankAccountNumber"
            placeholder="Enter 11 digit account number"
            required
          />
        </div>

        <div class="flex flex-col space-y-3">
          <label for="ammountToAdd" class="text-zinc-400 text-base font-medium"
            >Amount to Add</label
          >
          <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="ammountToAdd"
            id="ammountToAdd"
            placeholder="Add Amount to withdraw"
            required
          />
        </div>

        <div class="flex flex-col space-y-3">
          <label for="pin" class="text-zinc-400 text-base font-medium"
            >Select A Bank</label
          >
          <select
            name="selecBank"
            id="selecBank"
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700 appearance-none"
          >
            <option value="select" disabled selected>Select a Bank</option>
            <option value="dbb">Douch Bangla Bank</option>
            <option value="islami">Islami Bank</option>
          </select>

          <!-- <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="pin"
            id="pin"
            placeholder="Enter 4 Digit Pin"
            required
          /> -->
        </div>

        <div class="flex flex-col space-y-3">
          <label for="pinNumber" class="text-zinc-400 text-base font-medium"
            >Pin Number</label
          >
          <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="pinNumber"
            id="pinNumber"
            placeholder="Enter 4 digit pin number"
            required
          />
        </div>

        <!-- login btn -->
        <button
          type="submit"
          id="btnContinue"
          class="text-base font-normal w-full px-4 py-3.5 bg-white text-zinc-900 rounded-[30px]"
        >
          Add Money
        </button>
      </form>
    </section>
  </body>
</html>
