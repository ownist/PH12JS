<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- link tailwindcss using play - cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link style.css file -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- link daisy ui using cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body
    class="bg-[#1C1C1E] w-full min-h-dvh flex items-center justify-center text-white"
  >
    <section class="w-full p-4 space-y-5 sm:hidden">
      <!-- logo -->
      <div class="text-center text-3xl font-normal">
        <span>Payoo</span>
      </div>

      <!-- form -->
      <form action="#" class="space-y-4">
        <!-- input group -->
        <div class="flex flex-col space-y-3">
          <label for="phone" class="text-zinc-400 text-base font-medium"
            >Mobile Number</label
          >
          <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="phone"
            id="phone"
            placeholder="Enter your number"
            required
          />
        </div>
        <div class="flex flex-col space-y-3">
          <label for="pin" class="text-zinc-400 text-base font-medium"
            >4 Digit Pin</label
          >
          <input
            class="text-zinc-300 text-base w-full font-light px-5 py-4 bg-zinc-800 rounded-lg outline-none border-none focus:bg-zinc-700"
            type="number"
            name="pin"
            id="pin"
            placeholder="Enter 4 Digit Pin"
            required
          />
        </div>

        <!-- login btn -->
        <button
          type="submit"
          id="btnContinue"
          class="text-base font-normal w-full px-4 py-3.5 bg-white text-zinc-900 rounded-[30px]"
        >
          Continue
        </button>
      </form>
    </section>

    <!-- connect js file -->
    <script src="./js/main.js"></script>
  </body>
</html>
